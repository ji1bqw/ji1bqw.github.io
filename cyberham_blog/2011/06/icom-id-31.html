<h1>ICOM ID-31</h1>
<p class="date">--- Internet Linked Radio Amateur ---</p>
<div class="entry-body">
<div class="entry-body-text">
<p>ICOMから<a href="http://www.universal-radio.com/catalog/ht/2031.html">新しいD-STAR DV対応のハンディ</a>が発表されたようですね。ID-80と比べると薄そうです。テンキーパッドの代わりにDirectional Keypadというのが付いたようですが，使い勝ってはどうなんでしょう，気になりますね。個人的にはbuilt-in GPSは不要ですが，最近のはやりのようですね。</p>
