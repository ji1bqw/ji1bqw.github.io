<h1>バイブロのつまみ</h1>
<p class="date">--- Internet Linked Radio Amateur ---</p>
<div class="entry-body">
<div class="entry-body-text">
<p></p>
<p>バイブロバグキーのつまみの部分は，まるでストレートキーのつまみを横にした形になっています。これが使いやすい。打とうとして親指と人差し指を開くと，その間隔，そして人さじ指の位置が丁度つまみに来ます。よく考えてありますね。</p>
