<h1>節電効果</h1>
<p class="date">--- Internet Linked Radio Amateur ---</p>
<div class="entry-body">
<div class="entry-body-text">
<p>4月の電気代請求書が届きました。震災以降，節電のため24時間運転だったVoIPノードのUNIX PC2台と無線機2台をシャットダウンしています。家の中全体の節電もしているので，これだけとは思いませんが，昨年4月に比べて家の電気使用量が -45.5% になりました。結構びっくりです。</p>
