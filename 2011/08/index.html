<h1>HDDクラッシュ</h1>
<p class="date">--- Internet Linked Radio Amateur ---</p>
<div class="entry-body">
<div class="entry-body-text">
<p>久しぶりにD-STAR HOTSPOTを立ち上げようとPCオンしたら，HDDクラッシュ！　立ち上がらない。手持ちのHDDと交換して，Windows XP再インストール中。遅いPCだからインストールも時間がかかります。HOTSPOT用のプログラムは何が必要だったかな，思い出して再インストールしないと。</p>
