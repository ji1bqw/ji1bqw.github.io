<h1>kernel panic</h1>
<p class="date">--- Internet Linked Radio Amateur ---</p>
<div class="entry-body">
<div class="entry-body-text">
<p>昨日ノードPCが突然 kernel panic を起こして止まってしまいました。ファイルシステム関係のようです。リブートでとりあえず動作再開しましたが、パソコンも古いのでハードディスクの寿命が近づいているのかも知れません。バックアップを再度取り直して、いよいよの時に備えます。</p>
